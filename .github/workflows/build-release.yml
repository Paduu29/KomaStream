name: Build Signed Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/komastream.jks"

      - name: Compute version from tag
        id: version
        shell: bash
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CODE=$(git rev-list --count HEAD)
          APK_NAME="KomaStream-v${VERSION_NAME}.apk"

          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/komastream.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        shell: bash
        run: |
          cp "app/build/outputs/apk/release/app-release.apk" "app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}

      - name: Prepare release notes from tag message
        shell: bash
        run: |
          TAG_MESSAGE="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")"
          if [ -n "$TAG_MESSAGE" ]; then
            printf '%s\n' "$TAG_MESSAGE" > release-notes.txt
          else
            printf 'Release %s\n' "${{ steps.version.outputs.version_name }}" > release-notes.txt
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: KomaStream v${{ steps.version.outputs.version_name }}
          body_path: release-notes.txt
          files: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
